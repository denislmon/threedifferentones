<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent — Three Different Ones</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@400;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e8e2d5;
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  h1 {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(2rem, 6vw, 4rem);
    color: #ff1a35;
    margin-bottom: 1rem;
  }
  p {
    opacity: 0.6;
    font-size: 1rem;
    line-height: 1.8;
    max-width: 400px;
    margin-bottom: 2.5rem;
  }
  a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: #c8001a;
    color: #fff;
    padding: 0.85rem 2rem;
    text-decoration: none;
    transition: background 0.2s;
  }
  a:hover { background: #ff1a35; }
</style>
</head>
<body>
  <h1>Message Sent!</h1>
  <p>Thanks for reaching out to Three Different Ones. We'll get back to you as soon as we can.</p>
  <a href="/">← Back to Site</a>
</body>
</html>
